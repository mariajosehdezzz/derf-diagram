<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrED Reverse Manufacturing Framework</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #A31F34; --gold: #c8a882; --blue: #4a7fd4;
    --green: #5ab87a; --border: #e0e0e0; --muted: #999;
    --dark: #1a1a1a; --card: #f7f7f7;
  }
  body {
    font-family: 'Inter', sans-serif;
    background: #fff;
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .diagram-wrap { width: 100%; max-width: 1100px; }
  .diag-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  .diag-title { font-size: 11px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); }
  .export-btn {
    font-family: 'Inter', sans-serif; font-size: 9px; font-weight: 700;
    letter-spacing: .12em; text-transform: uppercase;
    border: 1px solid var(--border); background: #fff; color: #555;
    padding: 6px 12px; border-radius: 3px; cursor: pointer;
    transition: background .15s, color .15s;
  }
  .export-btn:hover { background: var(--dark); color: #fff; border-color: var(--dark); }
  .node { cursor: pointer; }
  .node rect, .node ellipse { transition: filter .2s; }
  .node:hover rect, .node:hover ellipse { filter: drop-shadow(0 4px 12px rgba(0,0,0,.15)); }
  .tooltip {
    position: fixed; background: #fff; border: 1px solid var(--border);
    border-radius: 4px; padding: 14px 16px; width: 260px;
    box-shadow: 0 8px 28px rgba(0,0,0,.12); pointer-events: none;
    opacity: 0; transition: opacity .15s; z-index: 100;
  }
  .tooltip.visible { opacity: 1; }
  .tt-label { font-size: 8px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .tt-title { font-size: 13px; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
  .tt-body { font-size: 11px; color: #666; line-height: 1.65; }
  .tt-tag { display: inline-block; font-size: 8px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 2px 7px; border-radius: 2px; margin-top: 8px; }
  .tt-tag.tech { background: #e8f0fb; color: var(--blue); }
  .tt-tag.data { background: #fef8f0; color: var(--gold); }
  .tt-tag.decision { background: #fdecea; color: var(--red); }
  .tt-tag.output { background: #edf7f1; color: var(--green); }
  .legend { display: flex; gap: 20px; margin-top: 28px; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 9px; color: #888; }
  .leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .leg-line { width: 24px; height: 2px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="diagram-wrap" id="diagram-wrap">
  <div class="diag-header">
    <div class="diag-title">FrED Reverse Manufacturing — System Framework</div>
  </div>

  <svg id="main-svg" viewBox="0 0 1000 470" xmlns="http://www.w3.org/2000/svg">

    <!-- ═══════════════════════════════════════════════ -->
    <!-- INSPECTION STATION DETAIL EXPANSION            -->

    <line x1="330" y1="338" x2="330" y2="350" stroke="#4a7fd4" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="440" y1="338" x2="440" y2="350" stroke="#4a7fd4" stroke-width="1" stroke-dasharray="3 3"/>

  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#A31F34"></div>Reverse flow / trigger</div>

  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const tips = {
  fwd: { label:'Step 1 — Entry', title:'Forward Production', body:'Standard HMLV assembly workflow. Students build FrED units across a multi-station line. The reverse flow begins when a unit exits forward production.', tag:null },
  qc: { label:'Step 2 — Split Point', title:'QC Station', body:'Assembly-guide-based checkpoint: verifies screw placement and build sequence, not component condition. Units that fail enter the reverse flow. EOL units from inventory enter at the same junction.', tag:{text:'Trigger point',cls:'decision'} },
  dis: { label:'Step 3 — Reverse Flow', title:'Manual Disassembly', body:'Student or operator physically disassembles the FrED unit. Components are separated by sub-assembly and routed to the inspection station. Autonomous disassembly is out of scope.', tag:{text:'Human-in-the-loop',cls:'decision'} },
  ins: { label:'Step 4 — Data Capture', title:'Inspection Station', body:'Fixed imaging rig with dome diffuse lighting, standardized focal distance, and 3D-printed per-component placement fixtures. Captures RGB images of PLA and acrylic structural parts under identical conditions. Consistency here is what makes few-shot training valid.', tag:{text:'Primary data source',cls:'tech'} },
  therm: { label:'Step 5 — Secondary Input', title:'Thermistor History', body:'Production logs from forward assembly runs. Processed to flag extruder-adjacent components that exceeded thermal thresholds. Historical data only — not a live sensor during inspection.', tag:{text:'Secondary data source',cls:'data'} },
  ml: { label:'Step 6 — AI Layer', title:'ML Condition Assessment', body:'DINOv2 or CLIP backbone fine-tuned against the degradation rubric. Outputs a condition score per component per inspection event. Few-shot classification augmented synthetically for low real-sample volumes.', tag:{text:'Machine vision',cls:'tech'} },
  dec: { label:'Step 7 — Decision Layer', title:'Disposition Decision Layer', body:'Rule-based layer downstream of ML. Converts condition scores into reuse / remanufacture / recycle decisions using thresholds calibrated against expert judgment and replacement costs. Every decision is logged with its input data.', tag:{text:'Hybrid ML + rules',cls:'decision'} },
  cam: { label:'Hardware — Camera', title:'RGB Camera', body:'RGB sensor with Python SDK. Consistent exposure and gain control per session. Fixed focal length lens to eliminate zoom variability between operators and sessions.', tag:{text:'Primary sensor',cls:'tech'} },
  light: { label:'Hardware — Lighting', title:'Dome Diffuse LED', body:'Eliminates specular reflection on PLA and acrylic surfaces — critical for crack and deformation detection. CCS or Metaphase dome. Note: sub-assemblies with depth (extruder block) may need supplemental angled fill lighting.', tag:{text:'Illumination',cls:'tech'} },
  fix: { label:'Hardware — Fixture', title:'Per-Component Jig (3D-printed)', body:'One jig per component class, printed in-lab. Enforces part placement repeatability across student operators and sessions. Primary control for imaging consistency — without it, few-shot assumptions break down.', tag:{text:'Placement control',cls:'tech'} },
  trig: { label:'Hardware — Capture', title:'Capture Trigger', body:'Physical button or foot pedal connected to the capture script. Keeps student hands free during placement, reduces motion blur, and standardizes capture timing. Trigger → script → image saved with metadata (part ID, session, operator).', tag:{text:'Workflow control',cls:'tech'} }
};

const tooltip = document.getElementById('tooltip');

function showTip(e, id) {
  const t = tips[id];
  if (!t) return;
  tooltip.innerHTML = `
    <div class="tt-label">${t.label}</div>
    <div class="tt-title">${t.title}</div>
    <div class="tt-body">${t.body}</div>
    ${t.tag ? `<div class="tt-tag ${t.tag.cls}">${t.tag.text}</div>` : ''}
  `;
  tooltip.classList.add('visible');
  moveTip(e);
}

function moveTip(e) {
  const x = e.clientX + 16, y = e.clientY - 10, w = 260, vw = window.innerWidth;
  tooltip.style.left = (x + w > vw ? x - w - 32 : x) + 'px';
  tooltip.style.top = y + 'px';
}

function hideTip() { tooltip.classList.remove('visible'); }

document.querySelectorAll('.node').forEach(n => n.addEventListener('mousemove', moveTip));


</script>
